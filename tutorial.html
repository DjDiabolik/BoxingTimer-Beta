<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Boxing Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #1e1e1e;
            color: white;
            padding: 20px;
        }
        .step {
            margin-bottom: 25px;
        }
        .step-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2196F3;
            margin-bottom: 10px;
        }
        .step-desc {
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 15px;
            background: #2a2a2a;
            padding: 12px;
            border-radius: 12px;
        }
        .step-demo {
            background: #333;
            border-radius: 12px;
            padding: 10px;
            margin: 10px 0;
            font-size: 0.9rem;
            text-align: center;
        }
        button {
            background: #2196F3;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .highlight {
            animation: pulse 0.5s ease-in-out 3;
            box-shadow: 0 0 0 4px #ff9800;
            border-radius: 12px;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 #ff9800; }
            70% { box-shadow: 0 0 0 10px rgba(255,152,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,152,0,0); }
        }
    </style>
</head>
<body>
    <div id="tutorial-steps"></div>
    <div class="nav-buttons">
        <button id="prev-btn" disabled>◀ Indietro</button>
        <button id="next-btn">Avanti ▶</button>
        <button id="close-btn">Chiudi</button>
    </div>

    <script>
        // Lista degli step – modifica i testi a tuo piacimento
        const steps = [
            {
                title: "Benvenuto!",
                desc: "Questo tutorial ti guiderà attraverso le principali funzionalità del Boxing Timer. Premi 'Avanti' per iniziare.",
                demo: null,
                highlightSelector: null
            },
            {
                title: "START / PAUSA",
                desc: "Il grande pulsante centrale avvia il timer. Durante l'esecuzione, diventa 'PAUSA' per fermarlo. Se il timer è in pausa, puoi riprenderlo con lo stesso tasto.",
                demo: "Prova a premere START ora (si fermerà dopo 3 secondi automaticamente).",
                highlightSelector: "#btn-toggle"
            },
            {
                title: "Skip Avanti e Indietro",
                desc: "Usa ⏮ e ⏭ per saltare alla fase precedente o successiva. Utile per testare rapidamente la struttura del tuo allenamento.",
                highlightSelector: ".btn-skip"
            },
            {
                title: "RESET",
                desc: "Il pulsante RESET ferma il timer e riporta tutto all'inizio della sequenza.",
                highlightSelector: "button[onclick='resetTimer()']"
            },
            {
                title: "Fasi di Lavoro e Riposo",
                desc: "Puoi creare fasi personalizzate. Ogni fase può essere di tipo LAVORO (sfondo verde) o RIPOSO (sfondo rosso).",
                highlightSelector: ".type-toggle"
            },
            {
                title: "Scatti Casuali (Sprint)",
                desc: "Nelle fasi LAVORO, attivando 'SCATTI ON' sentirai un suono a tempo casuale nel range di secondi specificato nei due valori a destra.",
                highlightSelector: ".random-toggle-btn"
            },
            {
                title: "Avviso nei Riposi",
                desc: "Nelle fasi RIPOSO, attivando 'FUORI SECONDI ON' sentirai un warning a 10 secondi e dei tick negli ultimi 3 secondi.",
                highlightSelector: ".random-toggle-btn"
            },
            {
                title: "Preset di Allenamento",
                desc: "Salva la tua configurazione come Preset, caricali in seguito, esportali o importali. Apri le Impostazioni (⚙️) per gestirli.",
                highlightSelector: "#settings-btn"
            },
            {
                title: "Laboratorio (Suoni e Colori)",
                desc: "Sempre nelle Impostazioni, trovi il 'Laboratorio' dove puoi cambiare volume, suoni (gong, tick, sprint), colori e attivare la voce.",
                highlightSelector: "#settings-btn"
            },
            {
                title: "Tutorial Completato!",
                desc: "Ora sai tutto l'essenziale. Puoi riavviare il tutorial quando vuoi dal pulsante nelle impostazioni. Buon allenamento! 🥊",
                demo: null,
                highlightSelector: null
            }
        ];

        let currentStep = 0;

        function renderStep() {
            const step = steps[currentStep];
            const container = document.getElementById('tutorial-steps');
            container.innerHTML = `
                <div class="step">
                    <div class="step-title">Step ${currentStep+1}/${steps.length}: ${step.title}</div>
                    <div class="step-desc">${step.desc}</div>
                    ${step.demo ? `<div class="step-demo">💡 ${step.demo}</div>` : ''}
                </div>
            `;

            // Rimuovi eventuali highlight precedenti
            document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
            
            if (step.highlightSelector) {
                try {
                    const target = window.parent.document.querySelector(step.highlightSelector);
                    if (target) {
                        target.classList.add('highlight');
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } catch(e) { console.warn(e); }
            }

            document.getElementById('prev-btn').disabled = currentStep === 0;
            document.getElementById('next-btn').textContent = currentStep === steps.length-1 ? "Fine" : "Avanti ▶";
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                renderStep();
            } else {
                window.parent.document.getElementById('tutorial-modal').close();
                document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                renderStep();
            }
        }

        function closeTutorial() {
            window.parent.document.getElementById('tutorial-modal').close();
            document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderStep();
            document.getElementById('next-btn').addEventListener('click', nextStep);
            document.getElementById('prev-btn').addEventListener('click', prevStep);
            document.getElementById('close-btn').addEventListener('click', closeTutorial);
        });
    </script>
</body>
</html>
